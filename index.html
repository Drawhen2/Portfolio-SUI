<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walrus & SUI Monitor - CoinGecko Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container-main { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .grid-layout { display: grid; grid-template-columns: 1fr; gap: 2rem; }
        @media (min-width: 768px) { .grid-layout { grid-template-columns: 1fr 1fr; } }
        .widget-card { 
            background: #1e1e1e; 
            border-radius: 15px; 
            padding: 15px; 
            border: 1px solid #333;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="container-main">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-green-400 mb-2">Crypto Live Price</h1>
            <p class="text-gray-400">Data Real-time via CoinGecko Widget</p>
        </header>

        <div class="grid-layout">
            
            <div class="widget-card">
                <h2 class="text-xl font-semibold mb-4 text-center border-b border-gray-700 pb-2">SUI Network (SUI)</h2>
                <script src="https://widgets.coingecko.com/coingecko-coin-compare-chart-widget.js"></script>
                <coingecko-coin-compare-chart-widget 
                    coin-ids="sui" 
                    currency="usd" 
                    locale="id" 
                    v-on:price-converted="updateIDR">
                </coingecko-coin-compare-chart-widget>
                
                <script src="https://widgets.coingecko.com/coingecko-coin-ticker-widget.js"></script>
                <coingecko-coin-ticker-widget 
                    coin-id="sui" 
                    currency="idr" 
                    locale="id" 
                    transparent-background="true">
                </coingecko-coin-ticker-widget>
            </div>

            <div class="widget-card">
                <h2 class="text-xl font-semibold mb-4 text-center border-b border-gray-700 pb-2">Walrus (WAL)</h2>
                <script src="https://widgets.coingecko.com/coingecko-coin-compare-chart-widget.js"></script>
                <coingecko-coin-compare-chart-widget 
                    coin-ids="walrus-2" 
                    currency="usd" 
                    locale="id">
                </coingecko-coin-compare-chart-widget>

                <script src="https://widgets.coingecko.com/coingecko-coin-ticker-widget.js"></script>
                <coingecko-coin-ticker-widget 
                    coin-id="walrus-2" 
                    currency="idr" 
                    locale="id" 
                    transparent-background="true">
                </coingecko-coin-ticker-widget>
            </div>

        </div>

        <footer class="mt-12 text-center text-gray-500 text-sm">
            <p>Halaman ini diperbarui secara otomatis oleh widget CoinGecko.</p>
            <p class="mt-2" id="time-display"></p>
        </footer>
    </div>

    <script>
        // Menampilkan waktu lokal saat ini
        function updateTime() {
            const now = new Date();
            document.getElementById('time-display').innerText = "Waktu Lokal: " + now.toLocaleString('id-ID');
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>

</body>
</html>
